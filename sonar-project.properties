sonar.projectKey=eduai_core
sonar.projectName=EduAI Core
sonar.projectVersion=1.0

# Path to source directories
sonar.sources=.
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/chroma_db/**,*.db,*.json,*.txt,*.md,tests/**

# Path to test directories
sonar.tests=tests

# Coverage reporting
sonar.python.coverage.reportPaths=coverage.xml

# Python specifics
sonar.python.version=3.12
